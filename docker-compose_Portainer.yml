services:
  chastease:
    image: ghcr.io/amet-titulari/chastesae:latest
    restart: unless-stopped
    ports:
      - "3000:8000"
    environment:
      CHASTEASE_APP_NAME: "${CHASTEASE_APP_NAME}"
      CHASTEASE_DEBUG: "${CHASTEASE_DEBUG}"
      CHASTEASE_DATABASE_URL: "${CHASTEASE_DATABASE_URL}"
      CHASTEASE_MEDIA_DIR: "${CHASTEASE_MEDIA_DIR}"
      CHASTEASE_HYGIENE_OVERDUE_PENALTY_SECONDS: "${CHASTEASE_HYGIENE_OVERDUE_PENALTY_SECONDS}"
      CHASTEASE_AUDIT_LOG_PATH: "${CHASTEASE_AUDIT_LOG_PATH}"
      CHASTEASE_AUDIT_LOG_ENABLED: "${CHASTEASE_AUDIT_LOG_ENABLED}"
      CHASTEASE_TASK_OVERDUE_DEFAULT_PENALTY_SECONDS: "${CHASTEASE_TASK_OVERDUE_DEFAULT_PENALTY_SECONDS}"
      CHASTEASE_TASK_OVERDUE_SWEEPER_ENABLED: "${CHASTEASE_TASK_OVERDUE_SWEEPER_ENABLED}"
      CHASTEASE_TASK_OVERDUE_SWEEPER_INTERVAL_SECONDS: "${CHASTEASE_TASK_OVERDUE_SWEEPER_INTERVAL_SECONDS}"
      CHASTEASE_PROACTIVE_MESSAGES_ENABLED: "${CHASTEASE_PROACTIVE_MESSAGES_ENABLED}"
      CHASTEASE_PROACTIVE_MESSAGES_INTERVAL_SECONDS: "${CHASTEASE_PROACTIVE_MESSAGES_INTERVAL_SECONDS}"
      CHASTEASE_PROACTIVE_MESSAGES_COOLDOWN_SECONDS: "${CHASTEASE_PROACTIVE_MESSAGES_COOLDOWN_SECONDS}"
      CHASTEASE_PROACTIVE_MESSAGES_MAX_CONSECUTIVE: "${CHASTEASE_PROACTIVE_MESSAGES_MAX_CONSECUTIVE}"
      CHASTEASE_SESSION_TIMER_SWEEPER_ENABLED: "${CHASTEASE_SESSION_TIMER_SWEEPER_ENABLED}"
      CHASTEASE_SESSION_TIMER_SWEEPER_INTERVAL_SECONDS: "${CHASTEASE_SESSION_TIMER_SWEEPER_INTERVAL_SECONDS}"
      CHASTEASE_ADMIN_SECRET: "${CHASTEASE_ADMIN_SECRET}"
      CHASTEASE_AI_PROVIDER: "${CHASTEASE_AI_PROVIDER}"
      CHASTEASE_AI_API_URL: "${CHASTEASE_AI_API_URL}"
      CHASTEASE_AI_API_KEY: "${CHASTEASE_AI_API_KEY}"
      CHASTEASE_AI_CHAT_MODEL: "${CHASTEASE_AI_CHAT_MODEL}"
      CHASTEASE_AI_VISION_MODEL: "${CHASTEASE_AI_VISION_MODEL}"
      CHASTEASE_AI_OLLAMA_BASE_URL: "${CHASTEASE_AI_OLLAMA_BASE_URL}"
      CHASTEASE_AI_OLLAMA_MODEL: "${CHASTEASE_AI_OLLAMA_MODEL}"
      CHASTEASE_AI_OLLAMA_TIMEOUT_SECONDS: "${CHASTEASE_AI_OLLAMA_TIMEOUT_SECONDS}"
      CHASTEASE_WEB_PUSH_ENABLED: "${CHASTEASE_WEB_PUSH_ENABLED}"
      CHASTEASE_WEB_PUSH_VAPID_PUBLIC_KEY: "${CHASTEASE_WEB_PUSH_VAPID_PUBLIC_KEY}"
      CHASTEASE_WEB_PUSH_VAPID_PRIVATE_KEY: "${CHASTEASE_WEB_PUSH_VAPID_PRIVATE_KEY}"
      CHASTEASE_WEB_PUSH_VAPID_CLAIMS_SUB: "${CHASTEASE_WEB_PUSH_VAPID_CLAIMS_SUB}"
      CHASTEASE_PLAY_WS_DEBUG_ENABLED: "${CHASTEASE_PLAY_WS_DEBUG_ENABLED}"
      CHASTEASE_VERIFICATION_AI_PROVIDER: "${CHASTEASE_VERIFICATION_AI_PROVIDER}"
      CHASTEASE_VERIFICATION_OLLAMA_MODEL: "${CHASTEASE_VERIFICATION_OLLAMA_MODEL}"
      CHASTEASE_VERIFICATION_OLLAMA_TIMEOUT_SECONDS: "${CHASTEASE_VERIFICATION_OLLAMA_TIMEOUT_SECONDS}"
    volumes:
      - chastease_data:/app/data

volumes:
  chastease_data:
