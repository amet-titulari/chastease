services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - chastease_data:/app/data
    env_file:
      - .env
    environment:
      - CHASTEASE_DATABASE_URL=sqlite:////app/data/chastease.db
      - CHASTEASE_MEDIA_DIR=/app/data/media
      - CHASTEASE_POSE_LANDMARKER_MODEL_PATH=/opt/chastease-models/pose_landmarker.task
      - CHASTEASE_AI_PROVIDER=${CHASTEASE_AI_PROVIDER}
      - CHASTEASE_AI_API_URL=${CHASTEASE_AI_API_URL}
      - CHASTEASE_AI_API_KEY=${CHASTEASE_AI_API_KEY}
      - CHASTEASE_AI_CHAT_MODEL=${CHASTEASE_AI_CHAT_MODEL}
      - CHASTEASE_AI_VISION_MODEL=${CHASTEASE_AI_VISION_MODEL}
      - CHASTEASE_AI_OLLAMA_BASE_URL=${CHASTEASE_AI_OLLAMA_BASE_URL}
      - CHASTEASE_AI_OLLAMA_MODEL=${CHASTEASE_AI_OLLAMA_MODEL}
      - CHASTEASE_AI_OLLAMA_TIMEOUT_SECONDS=${CHASTEASE_AI_OLLAMA_TIMEOUT_SECONDS}
    restart: unless-stopped

volumes:
  chastease_data:
