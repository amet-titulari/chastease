services:
  chastease:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chastease-dev
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      UVICORN_RELOAD: "1"
      DATABASE_URL: sqlite:///data/chastease.db
      IMAGE_VERIFICATION_DIR: data/image_verifications
    volumes:
      - ./:/app
      - chastease_data:/app/data
    restart: unless-stopped

  chastease-pg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chastease-dev-pg
    profiles:
      - postgres
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      UVICORN_RELOAD: "1"
      DATABASE_URL: postgresql+psycopg://chastease:chastease@postgres:5432/chastease
      IMAGE_VERIFICATION_DIR: data/image_verifications
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: chastease-postgres
    profiles:
      - postgres
    environment:
      POSTGRES_USER: chastease
      POSTGRES_PASSWORD: chastease
      POSTGRES_DB: chastease
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chastease"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chastease_data:
  postgres_data:
