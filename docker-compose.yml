services:
  chastease:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chastease-dev
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      UVICORN_RELOAD: "1"
      DATABASE_URL: sqlite:///data/chastease.db
      IMAGE_VERIFICATION_DIR: data/image_verifications
    volumes:
      - ./:/app
      - chastease_data:/app/data
    restart: unless-stopped

volumes:
  chastease_data:
