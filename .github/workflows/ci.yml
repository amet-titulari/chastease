name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CHASTEASE_DATABASE_URL: sqlite:///./ci-data/chastease-ci.db
      CHASTEASE_MEDIA_DIR: ./ci-data/media
      CHASTEASE_AUDIT_LOG_PATH: ./ci-data/audit.log
      CHASTEASE_SECRET_ENCRYPTION_KEY: ci-secret-key
      CHASTEASE_DEBUG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          mkdir -p ci-data
          alembic upgrade head

      - name: Run tests
        run: python -m pytest -q
