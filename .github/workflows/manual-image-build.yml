name: Manual Docker Image Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (z. B. 0.2.0 oder dev-2026-02-26). Leer = auto"
        required: false
        type: string
      push_latest:
        description: "Zusätzlich :latest pushen"
        required: false
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LC}"

          INPUT_TAG="${{ inputs.image_tag }}"
          if [[ -z "${INPUT_TAG}" ]]; then
            TAG="manual-${GITHUB_RUN_NUMBER}"
          else
            TAG="${INPUT_TAG}"
          fi

          TAGS="${IMAGE}:${TAG}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \\`${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.tag }}\\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            echo "- Also pushed: \\`${{ steps.prep.outputs.image }}:latest\\`" >> "$GITHUB_STEP_SUMMARY"
          fi
