{% extends "base.html" %}

{% block extra_head %}
<style>
  .mx-shell {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    gap: 0.9rem;
  }
  .mx-head {
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    padding: 0.85rem;
    background: linear-gradient(150deg, rgba(15, 37, 62, 0.82), rgba(8, 12, 24, 0.82));
    display: grid;
    gap: 0.45rem;
  }
  .mx-head h2 { margin: 0; color: #ecf5ff; }
  .mx-note { margin: 0; color: #a8bfd7; }
  .mx-actions { display: flex; gap: 0.55rem; flex-wrap: wrap; }
  .mx-filters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.55rem;
    align-items: end;
  }
  .mx-filters label {
    display: grid;
    gap: 0.2rem;
    color: #b7cce0;
    font-size: 0.82rem;
  }
  .mx-filters input,
  .mx-filters select {
    width: 100%;
  }
  .mx-bulk {
    display: flex;
    gap: 0.45rem;
    flex-wrap: wrap;
  }
  .mx-table-wrap {
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    overflow: auto;
    background: rgba(9, 16, 29, 0.82);
  }
  table.mx-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 760px;
  }
  .mx-table th,
  .mx-table td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.5rem 0.55rem;
    text-align: left;
    vertical-align: middle;
  }
  .mx-table th {
    background: rgba(24, 50, 79, 0.45);
    color: #dff0ff;
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }
  .mx-table td {
    color: #c7dbef;
    font-size: 0.84rem;
  }
  .mx-key { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.75rem; color: #9db7d2; }
  .mx-title { color: #eff7ff; font-weight: 700; }
  .mx-active { color: #9fe0bd; }
  .mx-inactive { color: #ffb8b8; }
  .mx-check {
    width: 18px;
    height: 18px;
    accent-color: #57b1ff;
  }
  .mx-status { margin: 0; color: #a5bfd7; font-size: 0.84rem; }
  .warn { color: #ffb3b3; }
  .ok { color: #9ce2bb; }
</style>
{% endblock %}

{% block content %}
<section class="mx-shell">
  <section class="mx-head">
    <h2>Posture Matrix</h2>
    <p class="mx-note">Zentrale Zuordnung: Welche Posture ist in welchem Spielmodul verfuegbar.</p>
    <div class="mx-actions">
      <a href="/admin">Zurueck zum Admin Center</a>
      <a href="/games/postures?module_key=posture_training">Posture Library Details</a>
      <button type="button" id="mx-save">Matrix speichern</button>
      <button type="button" id="mx-reload" class="ghost">Neu laden</button>
    </div>
    <div class="mx-filters">
      <label>Suche
        <input id="mx-search" type="text" placeholder="Titel oder Key" />
      </label>
      <label>Modul-Fokus
        <select id="mx-module-filter"></select>
      </label>
      <label>Aktive anzeigen
        <select id="mx-active-only">
          <option value="all">Alle</option>
          <option value="active">Nur aktive</option>
          <option value="inactive">Nur inaktive</option>
        </select>
      </label>
    </div>
    <div class="mx-bulk">
      <button type="button" id="mx-bulk-enable">Sichtbare im Modul aktivieren</button>
      <button type="button" id="mx-bulk-disable" class="ghost">Sichtbare im Modul deaktivieren</button>
    </div>
    <p id="mx-status" class="mx-status"></p>
  </section>

  <section class="mx-table-wrap">
    <table class="mx-table" id="mx-table">
      <thead id="mx-head-row"></thead>
      <tbody id="mx-body"></tbody>
    </table>
  </section>
</section>
{% endblock %}

{% block scripts %}
<script>
let modules = [];
let items = [];

const statusEl = document.getElementById("mx-status");
const headEl = document.getElementById("mx-head-row");
const bodyEl = document.getElementById("mx-body");
const searchEl = document.getElementById("mx-search");
const moduleFilterEl = document.getElementById("mx-module-filter");
const activeOnlyEl = document.getElementById("mx-active-only");

function setStatus(msg, warn = false) {
  statusEl.textContent = msg || "";
  statusEl.className = warn ? "mx-status warn" : "mx-status";
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function api(url, options = {}) {
  const res = await fetch(url, options);
  const payload = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(payload.detail || res.statusText || "Fehler");
  return payload;
}

function renderTable() {
  const headerCells = ["<tr><th>Titel</th><th>Key</th><th>Aktiv</th>"];
  for (const mod of modules) {
    headerCells.push(`<th>${esc(mod.title || mod.key)}</th>`);
  }
  headerCells.push("</tr>");
  headEl.innerHTML = headerCells.join("");

  const visibleItems = getFilteredItems();
  bodyEl.innerHTML = visibleItems.map((item) => {
    const allowed = new Set(Array.isArray(item.allowed_module_keys) ? item.allowed_module_keys : []);
    const checks = modules.map((mod) => {
      const checked = allowed.has(mod.key) ? "checked" : "";
      return `<td><input class=\"mx-check\" type=\"checkbox\" data-posture-id=\"${item.id}\" data-module-key=\"${esc(mod.key)}\" ${checked} /></td>`;
    }).join("");

    return `
      <tr data-posture-id="${item.id}">
        <td><span class="mx-title">${esc(item.title)}</span></td>
        <td><span class="mx-key">${esc(item.posture_key)}</span></td>
        <td><span class="${item.is_active ? "mx-active" : "mx-inactive"}">${item.is_active ? "Ja" : "Nein"}</span></td>
        ${checks}
      </tr>
    `;
  }).join("");

  setStatus(`Ansicht: ${visibleItems.length}/${items.length} Postures sichtbar.`);
}

function getFilteredItems() {
  const q = (searchEl.value || "").trim().toLowerCase();
  const moduleKey = moduleFilterEl.value || "all";
  const activeMode = activeOnlyEl.value || "all";

  return items.filter((item) => {
    const title = String(item.title || "").toLowerCase();
    const key = String(item.posture_key || "").toLowerCase();
    if (q && !title.includes(q) && !key.includes(q)) return false;

    if (activeMode === "active" && !item.is_active) return false;
    if (activeMode === "inactive" && item.is_active) return false;

    if (moduleKey !== "all") {
      const allowed = Array.isArray(item.allowed_module_keys) ? item.allowed_module_keys : [];
      if (!allowed.includes(moduleKey)) return false;
    }
    return true;
  });
}

function populateModuleFilter() {
  moduleFilterEl.innerHTML = '<option value="all">Alle Module</option>' + modules
    .map((mod) => `<option value="${esc(mod.key)}">${esc(mod.title || mod.key)}</option>`)
    .join("");
}

async function loadMatrix() {
  setStatus("Matrix wird geladen...");
  const data = await api("/api/games/postures/matrix");
  modules = Array.isArray(data.modules) ? data.modules : [];
  items = Array.isArray(data.items) ? data.items : [];
  populateModuleFilter();
  renderTable();
  setStatus(`Matrix geladen: ${items.length} Postures, ${modules.length} Module.`);
}

function collectPayload() {
  return items.map((item) => ({
    posture_id: Number(item.id),
    allowed_module_keys: Array.isArray(item.allowed_module_keys) ? item.allowed_module_keys : [],
  }));
}

function syncItemFromCheckbox(checkbox) {
  const postureId = Number(checkbox.dataset.postureId || 0);
  const moduleKey = String(checkbox.dataset.moduleKey || "");
  if (!postureId || !moduleKey) return;

  const item = items.find((x) => Number(x.id) === postureId);
  if (!item) return;
  const allowed = new Set(Array.isArray(item.allowed_module_keys) ? item.allowed_module_keys : []);
  if (checkbox.checked) {
    allowed.add(moduleKey);
  } else {
    allowed.delete(moduleKey);
  }
  item.allowed_module_keys = [...allowed];
}

function applyBulkForVisible(checked) {
  const moduleKey = moduleFilterEl.value || "all";
  if (moduleKey === "all") {
    setStatus("Bitte zuerst im Modul-Fokus ein konkretes Modul waehlen.", true);
    return;
  }

  const visibleIds = new Set(getFilteredItems().map((item) => Number(item.id)));
  for (const item of items) {
    if (!visibleIds.has(Number(item.id))) continue;
    const allowed = new Set(Array.isArray(item.allowed_module_keys) ? item.allowed_module_keys : []);
    if (checked) {
      allowed.add(moduleKey);
    } else {
      allowed.delete(moduleKey);
    }
    item.allowed_module_keys = [...allowed];
  }
  renderTable();
}

async function saveMatrix() {
  const payload = { items: collectPayload() };
  try {
    const result = await api("/api/games/postures/matrix", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    setStatus(`Gespeichert: ${result.updated || 0} aktualisiert, ${result.skipped || 0} uebersprungen.`);
  } catch (err) {
    setStatus(`Speichern fehlgeschlagen: ${err.message}`, true);
  }
}

document.getElementById("mx-save").addEventListener("click", saveMatrix);
document.getElementById("mx-reload").addEventListener("click", () => {
  loadMatrix().catch((err) => setStatus(`Laden fehlgeschlagen: ${err.message}`, true));
});
document.getElementById("mx-bulk-enable").addEventListener("click", () => applyBulkForVisible(true));
document.getElementById("mx-bulk-disable").addEventListener("click", () => applyBulkForVisible(false));
searchEl.addEventListener("input", renderTable);
moduleFilterEl.addEventListener("change", renderTable);
activeOnlyEl.addEventListener("change", renderTable);
bodyEl.addEventListener("change", (event) => {
  const target = event.target;
  if (!(target instanceof HTMLInputElement)) return;
  if (!target.classList.contains("mx-check")) return;
  syncItemFromCheckbox(target);
});

loadMatrix().catch((err) => setStatus(`Laden fehlgeschlagen: ${err.message}`, true));
</script>
{% endblock %}
