{% extends "base.html" %}

{% block title %}Prototype App — Chastease{% endblock %}

{% block content %}
  <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
    <h1 id="appTitle" class="text-2xl font-bold">Prototype App</h1>
      <div id="authCard" class="mt-4 bg-gray-900 border border-gray-700 rounded-lg p-4">
      <h2 id="authTitle" class="font-semibold">Login / Register</h2>
      <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2">
        <div>
          <label class="text-sm text-gray-400">Username</label>
          <input id="username" class="mt-1 w-full rounded-md bg-gray-800 p-2" />
        </div>
        <div id="emailWrap">
          <label class="text-sm text-gray-400">Email</label>
          <input id="email" class="mt-1 w-full rounded-md bg-gray-800 p-2" />
        </div>
      </div>
      <div class="mt-3 flex gap-2">
        <div class="flex flex-col md:flex-row gap-2 w-full">
          <div class="flex-1">
            <label class="text-sm text-gray-400">Password</label>
            <input id="password" type="password" class="mt-1 w-full rounded-md bg-gray-800 p-2" />
          </div>
          <div class="flex-1">
            <label class="text-sm text-gray-400">Password (repeat)</label>
            <input id="passwordRepeat" type="password" class="mt-1 w-full rounded-md bg-gray-800 p-2" />
          </div>
        </div>
        <div class="flex items-end gap-2">
          <button id="loginBtn" class="px-3 py-1 bg-blue-600 rounded">Login</button>
          <button id="registerBtn" class="px-3 py-1 bg-gray-700 rounded">Register</button>
        </div>
      </div>
      <p id="userInfo" class="text-sm text-gray-400 mt-2"></p>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/app.js"></script>
{% endblock %}
