{% extends "base.html" %}

{% block title %}Prototype App — Chastease{% endblock %}

{% block content %}
  <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
    <h1 id="appTitle" class="text-2xl font-bold">Prototype App</h1>
      <div
        id="authCard"
        class="mt-4 bg-gray-900 border border-gray-700 rounded-lg p-4"
        data-auth-allow-local-login="{{ 'true' if auth_allow_local_login else 'false' }}"
        data-auth-enable-chaster-login="{{ 'true' if auth_enable_chaster_login else 'false' }}"
      >
      <h2 id="authTitle" class="font-semibold">Login / Register</h2>
      <div id="chasterLoginWrap" class="mt-3">
        <button id="chasterLoginBtn" class="w-full px-4 h-12 rounded border border-sky-600 text-sky-300 hover:bg-sky-900/30">
          Login mit Chaster (OAuth2)
        </button>
      </div>
      <div id="localAuthWrap">
      <div class="mt-3 grid grid-cols-1 gap-2">
        <div>
          <label class="text-sm text-gray-400">Username</label>
          <input id="username" class="mt-1 w-full rounded-md bg-gray-800 px-4 h-12" />
        </div>
        <div id="emailWrap">
          <label class="text-sm text-gray-400">Email</label>
          <input id="email" class="mt-1 w-full rounded-md bg-gray-800 px-4 h-12" />
        </div>
      </div>
      <div class="mt-3 flex gap-2 items-end">
        <div class="flex-1">
          <label class="text-sm text-gray-400">Password</label>
          <input id="password" type="password" class="mt-1 w-full rounded-md bg-gray-800 px-4 h-12" />
        </div>
        <div class="flex-1" id="passwordRepeatWrap">
          <label class="text-sm text-gray-400">Password (repeat)</label>
          <input id="passwordRepeat" type="password" class="mt-1 w-full rounded-md bg-gray-800 px-4 h-12" />
        </div>
        <div class="flex items-center gap-2">
          <button id="loginBtn" class="px-4 h-12 bg-blue-600 rounded">Login</button>
          <button id="registerBtn" class="px-4 h-12 bg-gray-700 rounded">Register</button>
        </div>
      </div>
      </div>
      <p id="userInfo" class="text-sm text-gray-400 mt-2"></p>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/session.js"></script>
  <script src="/static/js/app.js"></script>
{% endblock %}
