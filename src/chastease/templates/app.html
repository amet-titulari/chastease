{% extends "base.html" %}

{% block title %}Prototype App — Chastease{% endblock %}

{% block content %}
  <section class="card-elevated p-6 animate-fade-in"
    x-data="{
      mode: new URLSearchParams(location.search).get('mode') === 'register' ? 'register' : 'login',
      allowLocal: {{ 'true' if auth_allow_local_login else 'false' }},
      enableChaster: {{ 'true' if auth_enable_chaster_login else 'false' }}
    }">
    <h1 class="text-2xl font-bold" x-text="mode === 'register' ? 'Registrierung' : 'Login'">Login</h1>
      <div
        id="authCard"
        class="mt-4 card p-4"
        data-auth-allow-local-login="{{ 'true' if auth_allow_local_login else 'false' }}"
        data-auth-enable-chaster-login="{{ 'true' if auth_enable_chaster_login else 'false' }}"
      >
      <div x-show="enableChaster" id="chasterLoginWrap" class="mt-3">
        <button id="chasterLoginBtn" class="btn-outline w-full">
          Login mit Chaster (OAuth2)
        </button>
      </div>
      <div x-show="allowLocal" id="localAuthWrap">
      <div class="mt-3 grid grid-cols-1 gap-3">
        <div>
          <label class="label" for="username">Username</label>
          <input id="username" class="input mt-1" autocomplete="username" />
          <p id="usernameError" class="field-error hidden" role="alert"></p>
        </div>
        <div x-show="mode === 'register'" x-transition id="emailWrap">
          <label class="label" for="email">Email</label>
          <input id="email" type="email" class="input mt-1" autocomplete="email" />
          <p id="emailError" class="field-error hidden" role="alert"></p>
        </div>
      </div>
      <div class="mt-3 flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[200px]">
          <label class="label" for="password">Password</label>
          <input id="password" type="password" class="input mt-1" autocomplete="current-password" />
          <p id="passwordError" class="field-error hidden" role="alert"></p>
        </div>
        <div x-show="mode === 'register'" x-transition class="flex-1 min-w-[200px]" id="passwordRepeatWrap">
          <label class="label" for="passwordRepeat">Password (repeat)</label>
          <input id="passwordRepeat" type="password" class="input mt-1" autocomplete="new-password" />
        </div>
        <div class="flex items-center gap-2">
          <button x-show="mode === 'login'" id="loginBtn" class="btn-primary">Login</button>
          <button x-show="mode === 'register'" id="registerBtn" class="btn-secondary">Register</button>
        </div>
      </div>
      <div class="mt-3 text-sm text-text-secondary">
        <template x-if="mode === 'login'">
          <span>Noch kein Konto? <button type="button" @click="mode = 'register'" class="text-brand hover:underline">Registrieren</button></span>
        </template>
        <template x-if="mode === 'register'">
          <span>Bereits ein Konto? <button type="button" @click="mode = 'login'" class="text-brand hover:underline">Login</button></span>
        </template>
      </div>
      </div>
      <p id="userInfo" class="text-sm text-text-secondary mt-2" aria-live="polite"></p>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/session.js"></script>
  <script src="/static/js/app.js"></script>
{% endblock %}
