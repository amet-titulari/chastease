{% extends "base.html" %}

{% block title %}AI Chat — Chastease{% endblock %}

{% block content %}
  <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">AI Chat</h1>
      <div class="text-sm text-gray-400">Reiner Text-Chat (Prototyp)</div>
    </div>

    <div id="messages" class="mt-4 bg-gray-900 border border-gray-700 rounded-lg p-4 min-h-[200px]"></div>

    <div class="mt-4">
      <textarea id="messageInput" class="w-full rounded-md bg-gray-800 p-2" placeholder="Schreibe hier deine Nachricht..."></textarea>
      <div class="mt-2 text-right">
        <button id="sendBtn" class="px-3 py-1 bg-blue-600 rounded">Senden</button>
      </div>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/chat.js"></script>
{% endblock %}
