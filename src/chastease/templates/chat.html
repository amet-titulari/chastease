{% extends "base.html" %}

{% block title %}AI Chat — Chastease{% endblock %}

{% block content %}
  <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">AI Chat</h1>
      <div class="text-sm text-gray-400">Sessionbasierter LLM-Chat</div>
    </div>

    <p id="chatStatus" class="text-sm text-gray-400 mt-2">Lade Session...</p>
    <p id="chatSessionInfo" class="text-xs text-gray-500 mt-1">Session: -</p>

    <div id="messages" class="mt-4 bg-gray-900 border border-gray-700 rounded-lg p-4 min-h-[260px] max-h-[520px] overflow-y-auto space-y-2"></div>

    <div class="mt-4">
      <textarea id="messageInput" class="w-full rounded-md bg-gray-800 p-2 border border-gray-700" placeholder="Schreibe hier deine Nachricht..." rows="3"></textarea>
      <div class="mt-2 flex items-center justify-between">
        <span class="text-xs text-gray-500">Enter sendet · Shift+Enter für Zeilenumbruch</span>
        <button id="sendBtn" class="px-3 py-1 bg-blue-600 rounded">Senden</button>
      </div>
    </div>

    <div id="pendingActionsWrap" class="mt-4 hidden bg-gray-900 border border-gray-700 rounded-lg p-4">
      <h2 class="text-sm font-semibold text-gray-200">Pending Actions</h2>
      <div id="pendingActions" class="mt-2 space-y-2"></div>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/session.js"></script>
  <script src="/static/js/chat.js"></script>
{% endblock %}
