{% extends "base.html" %}

{% block title %}Dashboard — Chastease{% endblock %}

{% block content %}
  <section class="mt-4 bg-gray-900 border border-gray-700 rounded-xl p-6 space-y-4">
    <div>
      <h1 class="text-2xl font-semibold">Dashboard</h1>
      <p id="dashboardStatus" class="text-sm text-gray-400 mt-2">Lade Sitzungsstatus...</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 space-y-2">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Active session</p>
        <p id="activeSessionInfo" class="text-lg text-white">—</p>
      </div>
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 space-y-2">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Setup status</p>
        <p id="setupSessionInfo" class="text-lg text-white">—</p>
      </div>
    </div>
    <div class="flex flex-wrap gap-2">
      <button id="dashboardSetupBtn" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500">Go to setup</button>
      {% if session_kill_enabled %}
        <button id="dashboardKillBtn" class="px-4 py-2 rounded bg-red-600 hover:bg-red-500">Kill session</button>
      {% endif %}
      <button id="dashboardRefreshBtn" class="px-4 py-2 rounded bg-gray-700 hover:bg-gray-600">Refresh</button>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="/static/js/common.js"></script>
  <script src="/static/js/session.js"></script>
  <script src="/static/js/dashboard.js"></script>
{% endblock %}
