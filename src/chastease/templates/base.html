<!doctype html>
<html lang="de" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Chastease{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico?v=20260307" sizes="any" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <script src="/static/vendor/marked.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-text antialiased theme-transition" hx-boost="true">
  <header class="max-w-6xl mx-auto p-4">
    <nav class="flex items-center justify-between">
      <a href="/" class="text-lg font-bold hover:text-sky-400 transition-colors">Chastease</a>
      <div class="flex items-center gap-1">
        <a id="navPrimary" class="nav-link hidden" href="/app">App</a>
        <a id="navChat" class="nav-link hidden" href="/chat">Chat</a>
        <a id="navContract" class="nav-link hidden" href="/contract">Vertrag</a>
        <span id="navAuth" class="ml-2 inline-block"></span>
        <button
          x-data="{ dark: document.documentElement.classList.contains('dark') }"
          @click="dark = !dark; document.documentElement.classList.toggle('dark', dark); localStorage.setItem('chastease_theme', dark ? 'dark' : 'light')"
          class="nav-link" title="Design wechseln" aria-label="Farbschema umschalten">
          <svg x-show="dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <svg x-show="!dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-6xl mx-auto p-4 text-sm text-text-tertiary">
    &copy; Chastease
  </footer>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2" aria-live="polite"></div>

  <script src="/static/js/theme.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
