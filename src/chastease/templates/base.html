<!doctype html>
<html lang="de" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Chastease{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico?v=20260307" sizes="any" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <script src="/static/vendor/marked.min.js"></script>
  <style>
    body.app-shell {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.08), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(190, 24, 93, 0.06), transparent 20%),
        linear-gradient(180deg, rgba(2, 4, 10, 1), rgba(1, 3, 8, 1));
    }

    .app-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.32), transparent 80%);
      opacity: 0.22;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(18px);
      background: rgba(4, 7, 14, 0.86);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .app-header-inner,
    .app-main,
    .app-footer {
      width: min(100%, 1120px);
      margin: 0 auto;
    }

    .app-header-inner {
      padding: 0.9rem 1rem;
    }

    .app-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .app-brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .app-brand-wrap {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .app-brand-mark {
      width: 2.45rem;
      height: 2.45rem;
      border-radius: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.95), rgba(220, 38, 38, 0.92));
      box-shadow: 0 10px 26px rgba(234, 88, 12, 0.24);
    }

    .app-brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-brand-copy {
      min-width: 0;
    }

    .app-brand-subtitle {
      margin-top: 0.12rem;
      font-size: 0.74rem;
      color: rgba(var(--color-text-tertiary), 1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-nav-desktop {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 0;
    }

    .app-nav-cluster {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 0;
    }

    .app-menu-toggle {
      display: none;
    }

    .app-mobile-menu {
      display: none;
      margin-top: 0.75rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 12, 20, 0.92);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .app-mobile-shell[open] .app-mobile-menu {
      display: block;
    }

    .app-mobile-summary {
      list-style: none;
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border-radius: 0.9rem;
      padding: 0.5rem 0.8rem;
      color: rgba(var(--color-text-secondary), 1);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .app-mobile-summary::-webkit-details-marker {
      display: none;
    }

    .app-mobile-panel {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .app-mobile-panel .nav-link {
      width: 100%;
      justify-content: flex-start;
    }

    .app-main {
      padding: 1.25rem 1rem 3rem;
    }

    .app-footer {
      padding: 0 1rem 2rem;
      color: rgba(var(--color-text-tertiary), 1);
    }

    .section,
    .card,
    .card-elevated {
      border-color: rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(10, 15, 28, 0.94), rgba(3, 6, 13, 0.98));
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .section {
      padding: 1.35rem;
      border-radius: 1.2rem;
    }

    .card,
    .card-elevated {
      border-radius: 1rem;
    }

    .btn-primary,
    .btn-secondary,
    .btn-outline,
    .btn-danger,
    .btn-success,
    .nav-link {
      border-radius: 0.9rem;
    }

    .btn-primary,
    .btn-success,
    .btn-danger,
    .btn-secondary,
    .btn-outline {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgb(234 88 12), rgb(220 38 38));
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgb(249 115 22), rgb(239 68 68));
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn-outline {
      border-color: rgba(249, 115, 22, 0.28);
      color: rgb(253 186 116);
      background: rgba(249, 115, 22, 0.05);
    }

    .btn-outline:hover {
      background: rgba(249, 115, 22, 0.11);
    }

    .nav-link {
      color: rgba(var(--color-text-secondary), 1);
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .app-nav-cluster .nav-link,
    .app-mobile-panel .nav-link {
      min-height: 42px;
      padding: 0.55rem 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    .app-nav-cluster .nav-link:hover,
    .app-mobile-panel .nav-link:hover {
      border-color: rgba(249, 115, 22, 0.18);
      background: rgba(249, 115, 22, 0.06);
      color: rgb(var(--color-text));
    }

    .nav-link-active {
      border-color: rgba(249, 115, 22, 0.26) !important;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.11), rgba(220, 38, 38, 0.08)) !important;
      color: rgb(255 237 213) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .app-surface-hero {
      position: relative;
      overflow: hidden;
      border-radius: 1.35rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.1), transparent 24%),
        radial-gradient(circle at 85% 20%, rgba(190, 24, 93, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(8, 13, 25, 0.96), rgba(2, 4, 10, 0.99));
      box-shadow:
        0 34px 100px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .app-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.38rem 0.72rem;
      border-radius: 9999px;
      background: rgba(249, 115, 22, 0.09);
      color: rgb(253 186 116);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .app-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .app-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.012));
      color: rgba(var(--color-text-secondary), 1);
      font-size: 0.78rem;
    }

    .input,
    .select {
      border-radius: 0.9rem;
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(8, 13, 25, 0.92);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .input:focus,
    .select:focus {
      border-color: rgba(249, 115, 22, 0.62);
      --tw-ring-color: rgba(249, 115, 22, 0.18);
    }

    @media (max-width: 767px) {
      .app-header-inner {
        padding: 0.75rem 0.85rem;
      }

      .app-header-bar {
        align-items: flex-start;
      }

      .app-brand-mark {
        width: 2.2rem;
        height: 2.2rem;
        border-radius: 0.8rem;
      }

      .app-brand-subtitle {
        max-width: 40vw;
      }

      .app-nav-desktop {
        display: none;
      }

      .app-menu-toggle {
        display: block;
      }

      .app-main {
        padding: 0.85rem 0.75rem 2rem;
      }

      .app-footer {
        padding: 0 0.75rem 1.5rem;
      }

      .section {
        padding: 1rem;
        border-radius: 1rem;
      }

      .app-surface-hero {
        border-radius: 1rem;
      }
    }

    @media (min-width: 768px) {
      .app-mobile-shell {
        display: none;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="app-shell bg-surface text-text antialiased theme-transition">
  <header class="app-header">
    <div class="app-header-inner">
      <nav class="app-header-bar">
        <a href="/" class="app-brand-wrap hover:text-orange-300 transition-colors">
          <span class="app-brand-mark" aria-hidden="true">
            <img src="/static/favicon.ico?v=20260307" alt="" />
          </span>
          <span class="app-brand-copy">
            <span class="app-brand block">Chastease</span>
            <span class="app-brand-subtitle">Guided control, setup and live session flow</span>
          </span>
        </a>
        <div class="app-nav-desktop">
          <div class="app-nav-cluster">
            <a data-protected-nav data-nav-link="primary" class="nav-link hidden" href="/app">App</a>
            <a data-protected-nav data-nav-link="chat" class="nav-link hidden" href="/chat">Chat</a>
            <a data-protected-nav data-nav-link="contract" class="nav-link hidden" href="/contract">Vertrag</a>
          </div>
          <span data-nav-auth class="ml-2 inline-block"></span>
          <button
            x-data="{ dark: document.documentElement.classList.contains('dark') }"
            @click="dark = !dark; document.documentElement.classList.toggle('dark', dark); localStorage.setItem('chastease_theme', dark ? 'dark' : 'light')"
            class="nav-link" title="Design wechseln" aria-label="Farbschema umschalten">
            <svg x-show="dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="!dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
        </div>
        <details class="app-mobile-shell app-menu-toggle">
          <summary class="app-mobile-summary">
            <span>Menü</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
            </svg>
          </summary>
          <div class="app-mobile-menu">
            <div class="app-mobile-panel">
              <a data-protected-nav data-nav-link="primary" class="nav-link hidden" href="/app">App</a>
              <a data-protected-nav data-nav-link="chat" class="nav-link hidden" href="/chat">Chat</a>
              <a data-protected-nav data-nav-link="contract" class="nav-link hidden" href="/contract">Vertrag</a>
              <span data-nav-auth></span>
              <button
                x-data="{ dark: document.documentElement.classList.contains('dark') }"
                @click="dark = !dark; document.documentElement.classList.toggle('dark', dark); localStorage.setItem('chastease_theme', dark ? 'dark' : 'light')"
                class="nav-link" title="Design wechseln" aria-label="Farbschema umschalten">
                <svg x-show="dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg x-show="!dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <span x-text="dark ? 'Helles Design' : 'Dunkles Design'">Design wechseln</span>
              </button>
            </div>
          </div>
        </details>
      </nav>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer text-sm">
    &copy; Chastease
  </footer>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2" aria-live="polite"></div>

  <script src="/static/js/theme.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
